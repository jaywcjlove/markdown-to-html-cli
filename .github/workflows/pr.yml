name: CI-PR
on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          
      - run: npm install
      - run: npm run build
      - run: npm run package
      - run: npm run coverage